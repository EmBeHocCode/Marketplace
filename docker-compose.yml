services:
  postgres:
    image: postgres:16-alpine
    container_name: meowmarket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: meowmarket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - meowmarket-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meowmarket"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  meowmarket-postgres-data:
